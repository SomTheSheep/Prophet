apiVersion: v1
kind: ConfigMap
metadata:
  name: multilive-endpoints-config
  namespace: sre
data:
  endpoints.json: |
    {
      "crm": {
        "TARGET_QUERY": "histogram_quantile(0.90, sum(rate(istio_request_duration_milliseconds_bucket{app='ingress-gateway-otvpcse',request_url='/crm_gateway/v1/accounts'}[10m])) by (le))",
        "REGRESSOR_RPS": "sum(rate(istio_requests_total{app='ingress-gateway-otvpcse',request_url='/crm_gateway/v1/accounts'}[10m]))"
      },
      "metadata": {
        "TARGET_QUERY": "histogram_quantile(0.90, sum(rate(istio_request_duration_milliseconds_bucket{app='ingress-gateway-otvpcse',request_url='/metadata/delivery/GLOBAL/btv/services'}[10m])) by (le))",
        "REGRESSOR_RPS": "sum(rate(istio_requests_total{app='ingress-gateway-otvpcse',request_url='/metadata/delivery/GLOBAL/btv/services'}[10m]))"
      }
    }